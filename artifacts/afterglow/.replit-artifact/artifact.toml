kind = "mobile"
previewPath = "/"
title = "Afterglow"
version = "1.0.0"
id = "artifacts/afterglow"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19837

[services.development]
run = "pnpm --filter @workspace/afterglow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/afterglow", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/afterglow", "run", "serve" ]

[services.env]
PORT = "19837"
BASE_PATH = "/"
