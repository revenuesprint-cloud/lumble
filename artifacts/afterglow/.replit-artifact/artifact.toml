kind = "mobile"
previewPath = "/"
title = "LUMBLE"
version = "1.0.0"
id = "artifacts/LUMBLE"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19837

[services.development]
run = "pnpm --filter @workspace/LUMBLE run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/LUMBLE", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/LUMBLE", "run", "serve" ]

[services.env]
PORT = "19837"
BASE_PATH = "/"
