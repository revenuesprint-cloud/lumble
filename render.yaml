services:
  - type: web
    name: lumble-api
    runtime: node
    region: oregon          # closest to most US users; change to frankfurt for EU
    plan: free              # upgrade to starter ($7/mo) to avoid cold starts
    buildCommand: NODE_ENV=development npx --yes pnpm@9.15.9 install --frozen-lockfile && npx pnpm@9.15.9 --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      # DATABASE_URL — paste your Neon pooled connection string here (see setup guide)
      - key: DATABASE_URL
        sync: false
      # JWT_SECRET — Render can auto-generate a secure random value
      - key: JWT_SECRET
        generateValue: true
